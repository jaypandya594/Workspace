# =============================================================
#  iSecurify GRC Platform — Nginx Reverse Proxy Configuration
#  Copy to: /etc/nginx/sites-available/isecurify
#  Then:    sudo ln -s /etc/nginx/sites-available/isecurify /etc/nginx/sites-enabled/
#  Then:    sudo nginx -t && sudo systemctl reload nginx
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;           # ← CHANGE THIS

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;           # ← CHANGE THIS

    # ---- SSL Certificates (Let's Encrypt) ----
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;   # ← CHANGE
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;     # ← CHANGE

    # ---- SSL Hardening ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # ---- File Upload Limits ----
    client_max_body_size 50M;

    # ---- Proxy to iSecurify App ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_buffer_size 8k;
    }

    # ---- Static Files Caching ----
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    location /isecurify-icon.png {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Health Check ----
    location /api/auth/me {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # ---- Deny sensitive files ----
    location ~ /\. {
        deny all;
    }
    location ~ /prisma/ {
        deny all;
    }
}